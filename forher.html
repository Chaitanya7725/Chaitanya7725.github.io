<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goodbye</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0a0010;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
      color: #e0c3fc;
      padding: 40px 24px;
    }
    p {
      max-width: 560px;
      font-size: clamp(16px, 2.5vw, 20px);
      line-height: 1.9;
      text-align: center;
      color: #ddd;
    }
    span.goodbye {
      display: block;
      margin-top: 32px;
      font-style: italic;
      color: #c084fc;
      font-size: 1.1em;
    }
  </style>
</head>
<body>
  <p>
    As you know, I do want you to achieve milestones and be successfull.
    Wishing you a prosperous life ahead.
    Fact is: In the end, everyone have to look for themselves.
    Thats my cue to introspect within and apart ways completely.
    <span class="goodbye">Goodbye, Alba!</span>
  </p>
</body>
</html>
